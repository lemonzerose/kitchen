<style>
:root{
  --counter:#221F1A;
  --counter-2:#2E2A22;
  --paper:#FAF8F1;
  --paper-2:#F1ECDD;
  --ink:#1C1A16;
  --stamp:#B23A2E;
  --stamp-dark:#8C2C22;
  --highlight:#E8B93F;
  --sage:#5B7A5B;
  --line:#D8D2C4;
  --muted:#9A9284;
  --font-h:"PingFang TC","Heiti TC","Microsoft JhengHei",system-ui,sans-serif;
  --font-b:"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  --font-m:ui-monospace,"SF Mono",Consolas,"Cascadia Mono",monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
.app{background:var(--counter);color:var(--paper);font-family:var(--font-b);border-radius:14px;overflow:hidden;
  display:flex;flex-direction:column;height:100vh;max-height:900px;font-size:16px;}
.app button{font-family:var(--font-b);cursor:pointer;-webkit-appearance:none;appearance:none;}
.app input,.app textarea{font-family:var(--font-b);font-size:16px;}
.scrollarea{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.dish-card{transition:background .15s;}
.dish-card:active{background:var(--paper-2);}
.navbtn{transition:opacity .15s;}
.navbtn:active{opacity:.6;}
.pill{transition:transform .1s;}
.pill:active{transform:scale(.96);}
::-webkit-scrollbar{width:0;height:0;}
</style>
<div class="app" id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css"></script>
<script>
(function(){
  var DEFAULT_SHEET_ID = '1ERgPXq-uEtwkKIUDvIXrK5Ec9ck1pDyyYCKXiAs4se8';
  var DEFAULT_TABS = ['飯','麵','豬肉料理','雞肉料理','蔬菜','湯','其他'].map(function(n){ return {name:n, gid:''}; });

  var state = {
    sheetId: DEFAULT_SHEET_ID,
    tabs: DEFAULT_TABS,
    data: {},
    activeCategory: null,
    selected: {},
    view: 'order',
    haveText: '',
    loading: false,
    error: '',
    warning: '',
    configLoaded: false
  };

  function esc(s){
    return String(s==null?'':s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function parseCSV(text){
    var rows = [], row = [], field = '', inQ = false;
    for (var i=0;i<text.length;i++){
      var c = text[i];
      if (inQ){
        if (c === '"'){
          if (text[i+1] === '"'){ field += '"'; i++; } else { inQ = false; }
        } else field += c;
      } else {
        if (c === '"') inQ = true;
        else if (c === ',') { row.push(field); field=''; }
        else if (c === '\n') { row.push(field); rows.push(row); row=[]; field=''; }
        else if (c === '\r') {}
        else field += c;
      }
    }
    if (field.length>0 || row.length>0){ row.push(field); rows.push(row); }
    return rows.filter(function(r){ return r.some(function(f){ return f.trim() !== ''; }); });
  }

  function extractSheetId(input){
    input = (input||'').trim();
    var m = input.match(/\/d\/([a-zA-Z0-9-_]+)/);
    if (m) return m[1];
    return input;
  }

  function parseTabsInput(str){
    return String(str||'').split(',').map(function(s){ return s.trim(); }).filter(Boolean).map(function(entry){
      var parts = entry.split(/[:：]/);
      var name = (parts[0]||'').trim();
      var gid = parts.length>1 ? parts.slice(1).join(':').trim() : '';
      return {name: name, gid: gid};
    });
  }

  function tabNames(){ return state.tabs.map(function(t){ return t.name; }); }

  function normalizeIngredient(s){
    return String(s||'')
      .replace(/[\(（].*?[\)）]/g,'')
      .replace(/[\d.]+\s*(公克|公升|毫升|克|kg|g|ml|cc|顆|片|條|支|把|包|罐|大匙|小匙|湯匙|茶匙|杯|盒|塊|根|粒|尾|隻|少許|適量|瓣)?/g,'')
      .replace(/\s+/g,'')
      .trim();
  }

  function splitIngredients(cell){
    return String(cell||'')
      .split(/[、,，;\n]+/)
      .map(function(s){ return s.trim(); })
      .filter(function(s){ return s.length>0; });
  }

  async function loadConfig(){
    try{
      var r = await window.storage.get('config');
      if (r && r.value){
        var c = JSON.parse(r.value);
        if (c.sheetId) state.sheetId = c.sheetId;
        if (c.tabs && c.tabs.length) state.tabs = c.tabs;
      }
    }catch(e){}
    state.configLoaded = true;
    render();
    if (state.sheetId && state.tabs.length) fetchAll();
  }

  async function saveConfig(){
    try{
      await window.storage.set('config', JSON.stringify({sheetId: state.sheetId, tabs: state.tabs}));
    }catch(e){}
  }

  async function fetchAll(){
    if (!state.sheetId || !state.tabs.length){
      state.error = '請先輸入試算表 ID 與分頁名稱';
      render();
      return;
    }
    state.loading = true;
    state.error = '';
    state.warning = '';
    render();
    var newData = {};
    var failedTabs = [];
    var seenTexts = {};
    var dupTabs = [];
    var bust = Date.now();
    for (var i=0;i<state.tabs.length;i++){
      var tab = state.tabs[i];
      try{
        var url = tab.gid
          ? 'https://docs.google.com/spreadsheets/d/' + encodeURIComponent(state.sheetId) + '/export?format=csv&gid=' + encodeURIComponent(tab.gid) + '&_=' + bust + '_' + i
          : 'https://docs.google.com/spreadsheets/d/' + encodeURIComponent(state.sheetId) + '/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent(tab.name) + '&_=' + bust + '_' + i;
        var res = await fetch(url, {cache: 'no-store'});
        var text = await res.text();
        if (!res.ok || text.trim().indexOf('<') === 0){
          failedTabs.push(tab.name);
          continue;
        }
        var sig = text.trim().slice(0, 300);
        if (seenTexts[sig] && seenTexts[sig] !== tab.name){
          dupTabs.push(tab.name);
        } else {
          seenTexts[sig] = tab.name;
        }
        var rows = parseCSV(text);
        if (rows.length < 1){ newData[tab.name] = []; continue; }
        var header = rows[0].map(function(h){ return h.trim(); });
        var idxName = header.findIndex(function(h){ return h.indexOf('菜名') > -1; });
        var idxIng = header.findIndex(function(h){ return h.indexOf('食材') > -1; });
        var idxStep = header.findIndex(function(h){ return h.indexOf('步驟') > -1; });
        var idxLink = header.findIndex(function(h){ return h.indexOf('連結') > -1 || h.indexOf('食譜') > -1; });
        var idxTime = header.findIndex(function(h){ return h.indexOf('時間') > -1; });
        if (idxName<0) idxName = 0;
        if (idxIng<0) idxIng = 1;
        if (idxStep<0) idxStep = 2;
        if (idxLink<0) idxLink = 3;
        var dishes = [];
        for (var r=1;r<rows.length;r++){
          var row = rows[r];
          var name = (row[idxName]||'').trim();
          if (!name) continue;
          var ingRaw = row[idxIng]||'';
          dishes.push({
            id: tab.name + '::' + r,
            category: tab.name,
            name: name,
            ingredientsRaw: ingRaw,
            ingredients: splitIngredients(ingRaw),
            steps: (row[idxStep]||'').trim(),
            link: (row[idxLink]||'').trim(),
            time: idxTime>-1 ? (row[idxTime]||'').trim() : ''
          });
        }
        newData[tab.name] = dishes;
      }catch(e){
        failedTabs.push(tab.name);
      }
    }
    state.data = newData;
    var names = tabNames();
    if (!state.activeCategory || names.indexOf(state.activeCategory) === -1){
      state.activeCategory = names[0];
    }
    state.loading = false;
    state.error = failedTabs.length ? ('以下分頁讀取失敗，請確認名稱與共用權限：' + failedTabs.join('、')) : '';
    state.warning = dupTabs.length ? ('分頁「' + dupTabs.join('、') + '」抓到的內容跟其他分頁重複，請重新整理再試一次；若持續發生，可在分頁名稱後面加上 :GID 指定分頁（設定頁有說明）。') : '';
    await saveConfig();
    render();
  }

  function toggleSelect(id){
    if (state.selected[id]) delete state.selected[id];
    else state.selected[id] = true;
    render();
  }

  function allDishes(){
    var list = [];
    tabNames().forEach(function(t){
      (state.data[t]||[]).forEach(function(d){ list.push(d); });
    });
    return list;
  }

  function selectedDishes(){
    return allDishes().filter(function(d){ return state.selected[d.id]; });
  }

  function showModal(title, bodyHtml){
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:999;';
    overlay.innerHTML =
      '<div style="background:var(--paper);color:var(--ink);border-radius:16px 16px 0 0;padding:18px 18px 22px;max-width:480px;width:100%;max-height:82%;overflow-y:auto;font-family:var(--font-b);">' +
      '<div style="width:36px;height:4px;background:var(--line);border-radius:4px;margin:0 auto 14px;"></div>' +
      '<div style="font-weight:800;font-size:16px;margin-bottom:10px;">' + esc(title) + '</div>' +
      bodyHtml +
      '<button id="closeModalBtn" style="margin-top:14px;width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:700;font-size:15px;">關閉</button>' +
      '</div>';
    document.getElementById('app').style.position = 'relative';
    document.getElementById('app').appendChild(overlay);
    overlay.addEventListener('click', function(e){ if (e.target === overlay) overlay.remove(); });
    overlay.querySelector('#closeModalBtn').onclick = function(){ overlay.remove(); };
    return overlay;
  }

  function copyBlock(text, hint){
    return '<textarea id="copyTa" readonly style="width:100%;height:160px;font-family:var(--font-m);font-size:14px;padding:10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);resize:none;">' + esc(text) + '</textarea>' +
      '<div style="font-size:12.5px;color:var(--muted);margin:8px 0 10px;">' + esc(hint||'長按文字全選複製。') + '</div>' +
      '<button id="tryCopyBtn" style="width:100%;padding:12px;border-radius:10px;border:none;background:var(--stamp);color:#fff;font-weight:700;font-size:15px;">嘗試直接複製</button>';
  }

  function wireCopy(overlay, text){
    var ta = overlay.querySelector('#copyTa');
    setTimeout(function(){ ta.focus(); ta.select(); }, 50);
    overlay.querySelector('#tryCopyBtn').onclick = async function(){
      try{ await navigator.clipboard.writeText(text); this.textContent = '已複製！'; }
      catch(e){
        ta.focus(); ta.select();
        try{ document.execCommand('copy'); this.textContent = '已複製！'; }
        catch(e2){ this.textContent = '請手動長按複製'; }
      }
    };
  }

  function copyOrder(){
    var dishes = selectedDishes();
    if (!dishes.length){ showModal('尚未點餐', '<p style="font-size:14px;color:#6b6558;">目前還沒有選擇任何菜色喔！</p>'); return; }
    var d = new Date();
    var dateStr = d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
    var lines = ['今日點餐（' + dateStr + '）'];
    dishes.forEach(function(dish, i){ lines.push((i+1) + '. ' + dish.name); });
    lines.push('共 ' + dishes.length + ' 道');
    var text = lines.join('\n');
    var overlay = showModal('點餐清單', copyBlock(text));
    wireCopy(overlay, text);
  }

  function copyIngredients(){
    var dishes = selectedDishes();
    if (!dishes.length){ showModal('尚未點餐', '<p style="font-size:14px;color:#6b6558;">請先選擇菜色，才能產生食材清單。</p>'); return; }
    var counts = {}, order = [];
    dishes.forEach(function(dish){
      dish.ingredients.forEach(function(ing){
        var key = ing.trim();
        if (!key) return;
        if (!(key in counts)){ counts[key]=0; order.push(key); }
        counts[key]++;
      });
    });
    var text = order.map(function(k){ return '- ' + k + (counts[k]>1 ? '  ×' + counts[k] : ''); }).join('\n');
    var overlay = showModal('採買清單', copyBlock(text, '長按文字全選複製，貼到手機記事本 App 即可使用。'));
    wireCopy(overlay, text);
  }

  function matchResults(){
    var have = state.haveText.split(/[、,，;\n]+/).map(normalizeIngredient).filter(function(s){return s;});
    if (!have.length) return [];
    var results = allDishes().map(function(d){
      var total = d.ingredients.length;
      if (!total) return {dish:d, ratio:0, matched:0, total:0, missing:d.ingredients};
      var matchedList = [], missing = [];
      d.ingredients.forEach(function(ing){
        var norm = normalizeIngredient(ing);
        var hit = have.some(function(h){ return h && norm && (norm.indexOf(h)>-1 || h.indexOf(norm)>-1); });
        if (hit) matchedList.push(ing); else missing.push(ing);
      });
      return {dish:d, ratio: matchedList.length/total, matched: matchedList.length, total: total, missing: missing};
    });
    return results.filter(function(r){ return r.matched>0; }).sort(function(a,b){ return b.ratio-a.ratio || b.matched-a.matched; });
  }

  function setView(v){ state.view = v; render(); }

  function render(){
    var app = document.getElementById('app');
    app.innerHTML = renderTop() + '<div class="scrollarea">' + renderBody() + '</div>' + renderBottomNav();
    bindEvents();
  }

  function renderTop(){
    var count = Object.keys(state.selected).length;
    return '<div style="flex-shrink:0;background:var(--counter-2);padding:14px 16px;border-bottom:1px solid #3a3529;display:flex;align-items:center;justify-content:space-between;">' +
      '<div style="font-family:var(--font-h);font-weight:800;font-size:18px;color:var(--paper);display:flex;align-items:center;gap:8px;">' +
        '<i class="ti ti-tools-kitchen-2" aria-hidden="true"></i>廚房點餐機</div>' +
      (count>0 ? '<span style="background:var(--stamp);color:#fff;font-family:var(--font-m);font-size:12.5px;font-weight:700;border-radius:20px;padding:4px 11px;">已選 ' + count + '</span>' : '') +
    '</div>';
  }

  function renderBottomNav(){
    var tabs = [
      {id:'order', label:'點餐', icon:'ti-clipboard-list'},
      {id:'ingredients', label:'採買清單', icon:'ti-shopping-cart'},
      {id:'match', label:'食材比對', icon:'ti-search'},
      {id:'settings', label:'設定', icon:'ti-settings'}
    ];
    return '<div style="flex-shrink:0;background:var(--counter-2);border-top:1px solid #3a3529;display:flex;padding:6px 4px calc(6px + env(safe-area-inset-bottom));">' +
      tabs.map(function(t){
        var active = state.view === t.id;
        return '<button data-view="' + t.id + '" class="navbtn" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;border:none;background:transparent;color:' + (active?'var(--highlight)':'var(--paper)') + ';">' +
          '<i class="ti ' + t.icon + '" aria-hidden="true" style="font-size:21px;"></i>' +
          '<span style="font-size:11px;font-weight:' + (active?'800':'500') + ';">' + t.label + '</span></button>';
      }).join('') +
    '</div>';
  }

  function renderBody(){
    if (!state.configLoaded){
      return '<div style="padding:40px;text-align:center;color:var(--muted);">載入中…</div>';
    }
    if (state.view === 'settings') return renderSettings();
    if (!state.sheetId || !state.tabs.length){
      return '<div style="padding:32px 20px;text-align:center;">' +
        '<i class="ti ti-tools" style="font-size:32px;color:var(--muted);"></i>' +
        '<p style="color:var(--paper);margin:12px 0 4px;font-weight:700;">還沒有連上試算表</p>' +
        '<p style="color:var(--muted);font-size:13px;margin:0 0 16px;">請先到「設定」輸入試算表資訊</p>' +
      '</div>';
    }
    if (state.view === 'order') return renderOrder();
    if (state.view === 'ingredients') return renderIngredients();
    if (state.view === 'match') return renderMatch();
    return '';
  }

  function renderSettings(){
    return '<div style="padding:18px 16px 28px;">' +
      (state.loading ? '<p style="color:var(--highlight);font-size:13px;margin-bottom:10px;">讀取中…</p>' : '') +
      (state.error ? '<div style="background:#3a2420;border:1px solid var(--stamp);color:#f5c9c2;border-radius:8px;padding:10px 12px;font-size:12.5px;margin-bottom:10px;">' + esc(state.error) + '</div>' : '') +
      (state.warning ? '<div style="background:#3a3420;border:1px solid var(--highlight);color:#f0dca0;border-radius:8px;padding:10px 12px;font-size:12.5px;margin-bottom:10px;">' + esc(state.warning) + '</div>' : '') +
      (!state.error && !state.warning && !state.loading && Object.keys(state.data).length ? '<div style="background:#233327;border:1px solid var(--sage);color:#b8dcc1;border-radius:8px;padding:10px 12px;font-size:12.5px;margin-bottom:10px;">已連上試算表，共讀取 ' + allDishes().length + ' 道菜色</div>' : '') +
      '<div style="background:var(--paper);color:var(--ink);border-radius:12px;padding:16px;">' +
        '<p style="font-weight:800;margin:0 0 10px;font-size:15px;">連接 Google 試算表</p>' +
        '<label style="font-size:12.5px;color:#6b6558;font-weight:700;">試算表網址或 ID</label>' +
        '<input id="sheetIdInput" value="' + esc(state.sheetId) + '" style="width:100%;padding:11px 12px;border-radius:8px;border:1px solid var(--line);margin:6px 0 14px;font-size:14px;">' +
        '<label style="font-size:12.5px;color:#6b6558;font-weight:700;">分頁名稱（逗號分隔）</label>' +
        '<input id="tabsInput" value="' + esc(state.tabs.map(function(t){ return t.gid ? t.name+':'+t.gid : t.name; }).join(', ')) + '" style="width:100%;padding:11px 12px;border-radius:8px;border:1px solid var(--line);margin:6px 0 16px;font-size:14px;">' +
        '<button id="loadBtn" style="width:100%;padding:13px;border-radius:10px;border:none;background:var(--stamp);color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;gap:6px;">' +
          '<i class="ti ti-refresh" aria-hidden="true"></i>' + (state.loading ? '讀取中…' : '重新讀取試算表') + '</button>' +
        '<details style="margin-top:16px;"><summary style="font-size:13px;color:var(--stamp);font-weight:700;cursor:pointer;">設定說明 / 疑難排解</summary>' +
        '<ol style="font-size:12.5px;color:#4a453c;padding-left:18px;line-height:1.9;margin:10px 0 0;">' +
          '<li>試算表右上角「共用」→ 一般存取權設為「知道連結的任何人」（檢視者）</li>' +
          '<li>各分頁標題列須包含「菜名」「食材」「步驟」「食譜連結」「時間」文字，順序不拘</li>' +
          '<li>分頁名稱需與試算表分頁名稱完全一致</li>' +
          '<li>若某分頁一直讀到跟別的分頁重複的內容，可在名稱後面加上 :GID（例如「湯:987654321」），GID 是點開該分頁時網址最後 #gid= 後面的數字</li>' +
        '</ol></details>' +
      '</div>' +
    '</div>';
  }

  function renderOrder(){
    var names = tabNames();
    var dishes = state.data[state.activeCategory] || [];
    var selCount = Object.keys(state.selected).length;
    var html = '<div style="padding:12px 0 0;">';
    html += '<div style="display:flex;gap:7px;overflow-x:auto;padding:0 14px 12px;">';
    html += names.map(function(t){
      var active = t === state.activeCategory;
      return '<button data-cat="' + esc(t) + '" class="pill" style="white-space:nowrap;padding:9px 16px;border-radius:20px;border:1px solid ' + (active?'var(--highlight)':'#4a4436') + ';background:' + (active?'var(--highlight)':'transparent') + ';color:' + (active?'var(--ink)':'var(--paper)') + ';font-weight:700;font-size:14px;">' + esc(t) + '</button>';
    }).join('');
    html += '</div>';
    html += '<div style="background:var(--paper);color:var(--ink);border-radius:14px 14px 0 0;margin:0 10px;overflow:hidden;padding-bottom:2px;">';
    if (!dishes.length){
      html += '<div style="padding:28px;text-align:center;color:var(--muted);font-size:14px;">這個分頁目前沒有菜色資料</div>';
    } else {
      dishes.forEach(function(d){
        var checked = !!state.selected[d.id];
        html += '<div class="dish-card" style="padding:14px;border-bottom:1px solid var(--line);display:flex;gap:12px;">' +
          '<input type="checkbox" data-toggle="' + d.id + '" ' + (checked?'checked':'') + ' style="margin-top:3px;width:22px;height:22px;accent-color:var(--stamp);flex-shrink:0;">' +
          '<div style="flex:1;min-width:0;">' +
            '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">' +
              '<span style="font-weight:800;font-size:16px;">' + esc(d.name) + '</span>' +
              (d.time ? '<span style="font-size:11.5px;color:var(--sage);border:1px solid var(--sage);border-radius:10px;padding:1px 8px;display:inline-flex;align-items:center;gap:3px;"><i class="ti ti-clock" aria-hidden="true"></i>' + esc(d.time) + '</span>' : '') +
              (d.link ? '<a href="' + esc(d.link) + '" target="_blank" rel="noopener" style="color:var(--stamp);font-size:12.5px;display:inline-flex;align-items:center;gap:3px;text-decoration:none;font-weight:700;"><i class="ti ti-external-link" aria-hidden="true"></i>食譜</a>' : '') +
            '</div>' +
            '<div style="font-size:13px;color:#6b6558;margin-top:4px;line-height:1.5;">' + esc(d.ingredients.join('、') || '（未填寫食材）') + '</div>' +
            (d.steps ? '<details style="margin-top:7px;"><summary style="font-size:13px;color:var(--stamp);cursor:pointer;font-weight:700;">步驟</summary><div style="font-size:13.5px;color:#4a453c;margin-top:7px;white-space:pre-wrap;line-height:1.75;">' + esc(d.steps) + '</div></details>' : '') +
          '</div>' +
        '</div>';
      });
    }
    html += '</div>';

    html += '<div style="position:sticky;bottom:0;background:var(--counter);padding:10px 10px 4px;">';
    html += '<button id="viewReceiptBtn" style="width:100%;padding:13px;border-radius:12px;border:none;background:var(--highlight);color:var(--ink);font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;">' +
      '<i class="ti ti-receipt" aria-hidden="true"></i>' + (selCount ? ('查看點餐單（已選 ' + selCount + ' 道）') : '尚未選擇菜色') + '</button>';
    html += '</div>';
    html += '</div>';
    return html;
  }

  function openReceipt(){
    var dishes = selectedDishes();
    var body;
    if (!dishes.length){
      body = '<p style="font-size:14px;color:#6b6558;">還沒有選擇菜色，回到點餐頁面勾選想吃的餐點吧！</p>';
    } else {
      body = '<div style="font-family:var(--font-m);border:1px dashed var(--line);border-radius:8px;padding:14px;margin-bottom:14px;">';
      dishes.forEach(function(d,i){
        body += '<div style="display:flex;justify-content:space-between;font-size:13.5px;padding:4px 0;"><span>' + (i+1) + '. ' + esc(d.name) + '</span></div>';
      });
      body += '<div style="border-top:1px dashed var(--line);margin-top:8px;padding-top:8px;font-size:12.5px;text-align:right;color:#6b6558;">共 ' + dishes.length + ' 道</div>';
      body += '</div>';
      body += '<div style="display:flex;flex-direction:column;gap:9px;">';
      body += '<button id="copyOrderBtn" style="padding:12px;border-radius:10px;border:none;background:var(--stamp);color:#fff;font-weight:700;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:6px;"><i class="ti ti-copy" aria-hidden="true"></i>複製點餐清單</button>';
      body += '<button id="genIngBtn" style="padding:12px;border-radius:10px;border:1px solid var(--ink);background:transparent;color:var(--ink);font-weight:700;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:6px;"><i class="ti ti-shopping-cart" aria-hidden="true"></i>產生採買清單</button>';
      body += '</div>';
    }
    var overlay = showModal('今日點餐單', body);
    var b1 = overlay.querySelector('#copyOrderBtn');
    if (b1) b1.onclick = function(){ overlay.remove(); copyOrder(); };
    var b2 = overlay.querySelector('#genIngBtn');
    if (b2) b2.onclick = function(){ overlay.remove(); setView('ingredients'); };
  }

  function renderIngredients(){
    var dishes = selectedDishes();
    if (!dishes.length){
      return '<div style="padding:32px 20px;text-align:center;color:var(--muted);font-size:14px;">請先到「點餐」頁面選擇菜色</div>';
    }
    var counts = {}, order = [];
    dishes.forEach(function(d){
      d.ingredients.forEach(function(ing){
        var k = ing.trim(); if (!k) return;
        if (!(k in counts)){ counts[k]=0; order.push(k); }
        counts[k]++;
      });
    });
    var html = '<div style="padding:14px;">';
    html += '<div style="background:var(--paper);color:var(--ink);border-radius:14px;padding:16px;">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">';
    html += '<span style="font-weight:800;font-size:15px;">採買清單（' + order.length + ' 項）</span>';
    html += '<button id="copyIngBtn2" style="padding:9px 14px;border-radius:8px;border:none;background:var(--stamp);color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;gap:5px;"><i class="ti ti-copy" aria-hidden="true"></i>複製</button>';
    html += '</div>';
    order.forEach(function(k){
      html += '<label style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);font-size:15px;">' +
        '<input type="checkbox" style="width:20px;height:20px;accent-color:var(--sage);flex-shrink:0;">' +
        '<span>' + esc(k) + (counts[k]>1 ? ' <span style="color:var(--muted);font-family:var(--font-m);">×' + counts[k] + '</span>' : '') + '</span></label>';
    });
    html += '<p style="font-size:12px;color:var(--muted);margin:12px 0 0;">點「複製」後可貼到手機記事本 App 保存採買清單。</p>';
    html += '</div></div>';
    return html;
  }

  function renderMatch(){
    var results = matchResults();
    var html = '<div style="padding:14px;">';
    html += '<div style="background:var(--paper);color:var(--ink);border-radius:14px;padding:16px;">';
    html += '<label style="font-size:12.5px;font-weight:700;color:#6b6558;">你現在有哪些食材？（逗號分隔）</label>';
    html += '<textarea id="haveInput" placeholder="雞蛋, 番茄, 蔥, 豆腐" style="width:100%;height:64px;margin-top:7px;padding:11px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;resize:vertical;">' + esc(state.haveText) + '</textarea>';
    html += '<button id="matchBtn" style="margin-top:10px;width:100%;padding:12px;border-radius:10px;border:none;background:var(--stamp);color:#fff;font-weight:700;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:6px;"><i class="ti ti-search" aria-hidden="true"></i>看看能做什麼</button>';
    html += '</div>';

    if (state.haveText.trim()){
      html += '<div style="margin-top:12px;">';
      if (!results.length){
        html += '<div style="color:var(--muted);text-align:center;padding:20px;font-size:13.5px;">沒有符合的餐點，試試輸入更多食材</div>';
      } else {
        results.forEach(function(r){
          var pct = Math.round(r.ratio*100);
          var full = r.ratio >= 0.999;
          var checked = !!state.selected[r.dish.id];
          html += '<div style="background:var(--paper);color:var(--ink);border-radius:12px;padding:14px;margin-bottom:9px;">';
          html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">';
          html += '<div style="min-width:0;">';
          html += '<div style="font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">' + esc(r.dish.name) +
            (full ? '<span style="background:var(--sage);color:#fff;font-size:11px;padding:2px 9px;border-radius:12px;">現在就能做</span>' : '') + '</div>';
          html += '<div style="font-size:12px;color:#6b6558;margin-top:3px;">' + r.dish.category + ' · 符合 ' + r.matched + '/' + r.total + ' 項（' + pct + '%）' + (r.dish.time ? ' · ' + esc(r.dish.time) : '') + '</div>';
          if (r.missing.length) html += '<div style="font-size:12.5px;color:var(--stamp);margin-top:5px;">還缺：' + r.missing.map(esc).join('、') + '</div>';
          html += '</div>';
          html += '<label style="display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;white-space:nowrap;flex-shrink:0;"><input type="checkbox" data-toggle="' + r.dish.id + '" ' + (checked?'checked':'') + ' style="width:20px;height:20px;accent-color:var(--stamp);">加點</label>';
          html += '</div></div>';
        });
      }
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  function bindEvents(){
    var app = document.getElementById('app');
    app.querySelectorAll('[data-view]').forEach(function(el){
      el.addEventListener('click', function(){ setView(el.getAttribute('data-view')); });
    });
    app.querySelectorAll('[data-cat]').forEach(function(el){
      el.addEventListener('click', function(){ state.activeCategory = el.getAttribute('data-cat'); render(); });
    });
    app.querySelectorAll('[data-toggle]').forEach(function(el){
      el.addEventListener('change', function(){ toggleSelect(el.getAttribute('data-toggle')); });
    });
    var loadBtn = document.getElementById('loadBtn');
    if (loadBtn) loadBtn.addEventListener('click', function(){
      state.sheetId = extractSheetId(document.getElementById('sheetIdInput').value);
      state.tabs = parseTabsInput(document.getElementById('tabsInput').value);
      fetchAll();
    });
    var viewReceiptBtn = document.getElementById('viewReceiptBtn');
    if (viewReceiptBtn) viewReceiptBtn.addEventListener('click', openReceipt);
    var copyIngBtn2 = document.getElementById('copyIngBtn2');
    if (copyIngBtn2) copyIngBtn2.addEventListener('click', copyIngredients);
    var matchBtn = document.getElementById('matchBtn');
    if (matchBtn) matchBtn.addEventListener('click', function(){
      state.haveText = document.getElementById('haveInput').value;
      render();
    });
  }

  loadConfig();
})();
</script>
